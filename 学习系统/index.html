<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>前端知识学习系统</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      if (!redirect) return;
      var base = window.location.pathname.replace(/\/$/, '');
      if (base !== '/frontend-learning-system') base = '';
      window.history.replaceState(null, '', base + redirect);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #4ecdc4;
      --text: #e2e8f0;
      --text2: #8892aa;
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #fc8181;
      --code-bg: #161b22;
      --code-text: #e6edf3;
      --code-muted: #c9d1d9;
      --syntax-keyword: #ff7b72;
      --syntax-title: #d2a8ff;
      --syntax-constant: #79c0ff;
      --syntax-string: #a5d6ff;
      --syntax-variable: #ffa657;
      --syntax-comment: #8b949e;
      --syntax-tag: #7ee787;
      --syntax-section: #1f6feb;
      --syntax-bullet: #f2cc60;
      --syntax-addition: #aff5b4;
      --syntax-addition-bg: #033a16;
      --syntax-deletion: #ffdcd7;
      --syntax-deletion-bg: #67060c;
      --strong-text: #ffffff;
      --mark-bg: rgba(255, 213, 79, .18);
      --mark-text: #ffe89b;
      --blockquote-bg: rgba(108,99,255,.08);
      --radius: 12px;
      --pet-panel-bg: rgba(26, 29, 39, 0.85);
      --pet-widget-bg: rgba(255, 255, 255, 0.03);
      --pet-codex-bg: rgba(8, 10, 15, 0.96);

      /* 战宠大境界默认自定义变量 */
      --realm-color-primary: var(--accent2);
      --realm-color-secondary: var(--accent);
      --realm-glow-opacity: 0.15;
      --realm-spin-speed-outer: 25s;
      --realm-spin-speed-inner: 8s;
      --realm-float-speed: 5s;
      --realm-burst-spread: 90px;
      --realm-glow-color: rgba(78, 205, 196, 0.4);
      --realm-conic-glow: rgba(78, 205, 196, 0.08);
      --realm-conic-glow-alt: rgba(108, 99, 255, 0.08);
      --realm-cabin-glow-primary: rgba(78, 205, 196, 0.05);
      --realm-cabin-glow-secondary: rgba(108, 99, 255, 0.05);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f6f8fc;
      --surface: #ffffff;
      --surface2: #eef2fb;
      --border: #d7deef;
      --accent: #315efb;
      --accent2: #0ea5a4;
      --text: #1f2937;
      --text2: #5f6b85;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
      --code-bg: #f8fafc;
      --code-text: #24292f;
      --code-muted: #57606a;
      --syntax-keyword: #cf222e;
      --syntax-title: #8250df;
      --syntax-constant: #0550ae;
      --syntax-string: #0a3069;
      --syntax-variable: #953800;
      --syntax-comment: #6e7781;
      --syntax-tag: #116329;
      --syntax-section: #0550ae;
      --syntax-bullet: #3b2300;
      --syntax-addition: #116329;
      --syntax-addition-bg: #dafbe1;
      --syntax-deletion: #82071e;
      --syntax-deletion-bg: #ffebe9;
      --strong-text: #0f172a;
      --mark-bg: rgba(250, 204, 21, .28);
      --mark-text: #713f12;
      --blockquote-bg: rgba(49,94,251,.08);
      --pet-panel-bg: rgba(255, 255, 255, 0.85);
      --pet-widget-bg: rgba(0, 0, 0, 0.03);
      --pet-codex-bg: rgba(246, 248, 252, 0.96);
    }

    @media (prefers-reduced-motion: no-preference) {
      :root.theme-transitioning *,
      :root.theme-transitioning *::before,
      :root.theme-transitioning *::after {
        transition-property: background-color, color, border-color, box-shadow, fill, stroke, opacity;
        transition-duration: .26s;
        transition-timing-function: ease;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ========== NAV ========== */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      margin-right: 16px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .nav-logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .logo-fly-text {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 700;
      color: var(--success);
      text-shadow: 0 0 6px rgba(72, 187, 120, 0.4);
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      animation: flyUpAndFade 0.9s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    }
    @keyframes flyUpAndFade {
      0% {
        opacity: 0;
        transform: translate(-50%, 5px) scale(0.6);
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -10px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -35px) scale(0.9);
      }
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .theme-toggle-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .theme-toggle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .nav-tab {
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all .2s;
      border: none;
      background: transparent;
    }
    .nav-tab:hover { background: var(--surface2); color: var(--text); }
    .nav-tab.active { background: var(--accent); color: #fff; }

    /* ========== LAYOUT ========== */
    .main { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 56px); position: relative; }

    /* ========== SIDEBAR ========== */
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .sidebar-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .sidebar-logo-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .sidebar-logo-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-logo-sub {
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      padding-bottom: 16px;
    }
    .sidebar.is-scrolling {
      scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 6px; height: 6px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    .sidebar.is-scrolling::-webkit-scrollbar-thumb { background: var(--border); }
    .sidebar.is-scrolling::-webkit-scrollbar-thumb:hover { background: var(--text2); }
    .sidebar-module {
      margin-bottom: 4px;
    }
    .sidebar-module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .04em;
      user-select: none;
    }
    .sidebar-module-header:hover { color: var(--text); }
    .sidebar-module-header .chevron {
      margin-left: auto;
      transition: transform .2s;
      font-size: 10px;
    }
    .sidebar-module-header.open .chevron { transform: rotate(90deg); }
    .sidebar-module-list { display: none; }
    .sidebar-module-list.open { display: block; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px 9px 28px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active {
      background: rgba(108, 99, 255, .12);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .sidebar-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sidebar-item.done .dot { background: var(--success); }
    .sidebar-item .item-idx {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }

    /* ========== CONTENT AREA ========== */
    .content { flex: 1; overflow-y: auto; padding: 32px 48px; }
    .content-map { padding: 0; overflow: hidden; }

    /* ========== HOME ========== */
    .home { max-width: 900px; margin: 0 auto; }
    .home-hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .home-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .home-hero p { color: var(--text2); font-size: 15px; }
    .module-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }
    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
    }
    .module-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,.15);
    }
    .module-card-icon { font-size: 28px; margin-bottom: 12px; }
    .module-card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .module-card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .module-card-progress {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width .4s;
    }
    .progress-text { font-size: 12px; color: var(--text2); }

    .home-entry-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 4px 0 30px;
    }
    .home-entry-card {
      min-height: 126px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 18px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 8px;
      transition: all .2s;
    }
    .home-entry-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,.14);
    }
    .home-entry-card.primary {
      border-color: rgba(78,205,196,.45);
      background: linear-gradient(135deg, rgba(78,205,196,.12), rgba(108,99,255,.08)), var(--surface);
    }
    .home-entry-icon { font-size: 26px; }
    .home-entry-title { font-size: 17px; font-weight: 700; }
    .home-entry-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* ========== PET SYSTEM ========== */
    @keyframes aura-breathe {
      0% { transform: scale(0.95); opacity: 0.6; }
      50% { transform: scale(1.05); opacity: 0.9; }
      100% { transform: scale(0.95); opacity: 0.6; }
    }
    @keyframes rotate-star {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pet-widget {
      height: 38px;
      min-width: 130px;
      padding: 3px 12px 3px 4px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--pet-widget-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-right: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pet-widget:hover {
      border-color: rgba(78, 205, 196, 0.6);
      background: rgba(78, 205, 196, 0.06);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(78, 205, 196, 0.12);
    }
    .pet-widget-avatar {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      padding: 2px;
    }
    .pet-widget-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      text-align: left;
    }
    .pet-widget-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
      line-height: 1;
    }
    .pet-widget-progress {
      height: 3px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }
    .pet-widget-progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.35s ease;
    }

    .pet-home-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: radial-gradient(circle at 10% 10%, rgba(78, 205, 196, 0.06), transparent 35%),
                  radial-gradient(circle at 90% 90%, rgba(108, 99, 255, 0.06), transparent 35%),
                  var(--surface);
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 24px;
      padding: 24px;
      margin: 0 0 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pet-home-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.12), rgba(108, 99, 255, 0.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .pet-home-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(108, 99, 255, 0.12);
      border-color: rgba(108, 99, 255, 0.2);
    }
    .pet-home-visual {
      width: 120px;
      height: 120px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      position: relative;
    }
    .pet-home-visual::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.16) 0%, transparent 65%);
      z-index: 0;
      animation: aura-breathe 4s ease-in-out infinite;
    }
    .pet-home-visual img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.2));
      z-index: 1;
    }
    .pet-home-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      text-align: left;
    }
    .pet-home-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .pet-home-content h2 {
      font-size: 19px;
      font-weight: 700;
      color: var(--strong-text);
      letter-spacing: -0.01em;
      margin: 0;
    }
    .pet-home-content p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
    }
    .pet-home-metrics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pet-home-metrics span {
      padding: 4px 10px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 12px;
      color: var(--text2);
    }
    .pet-home-metrics strong {
      color: var(--text);
      font-weight: 600;
    }
    .pet-progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text2);
    }
    .pet-progress-row strong {
      color: var(--accent2);
    }
    .pet-large-progress {
      height: 6px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }
    .pet-large-progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      box-shadow: 0 0 8px rgba(78, 205, 196, 0.4);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes pet-mask-fade-in {
      0% {
        opacity: 0;
        background: rgba(10, 12, 18, 0);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
      }
      100% {
        opacity: 1;
        background: rgba(10, 12, 18, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    }
    @keyframes summon-cabin {
      0% {
        opacity: 0;
        transform: scale(0.85) rotate(-3deg);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }
    }
    @keyframes summon-avatar {
      0% {
        opacity: 0;
        transform: translateY(35px) scale(0.4) rotate(-5deg);
        filter: brightness(0) drop-shadow(0 0 20px var(--realm-color-secondary)) blur(8px);
      }
      65% {
        opacity: 1;
        filter: brightness(2.5) drop-shadow(0 0 40px var(--realm-color-primary)) blur(1px);
        transform: translateY(-5px) scale(1.08) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1) drop-shadow(0 10px 25px rgba(0, 0, 0, 0.25));
      }
    }
    @keyframes float-avatar {
      0% {
        transform: translateY(0px) rotate(0deg) scale(1);
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.22)) brightness(1);
      }
      50% {
        transform: translateY(-8px) rotate(2deg) scale(1.02);
        filter: drop-shadow(0 15px 25px rgba(108, 99, 255, 0.35)) brightness(1.08);
      }
      100% {
        transform: translateY(0px) rotate(0deg) scale(1);
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.22)) brightness(1);
      }
    }
    @keyframes reverse-rotate-aura {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes aura-burst {
      0% {
        box-shadow: 0 0 0 0 rgba(78, 205, 196, 0.5), 0 0 0 0 rgba(108, 99, 255, 0.3), inset 0 0 0 0 rgba(78, 205, 196, 0.2);
      }
      100% {
        box-shadow: 0 0 0 45px rgba(78, 205, 196, 0), 0 0 0 90px rgba(108, 99, 255, 0), inset 0 0 50px rgba(78, 205, 196, 0);
      }
    }
    @keyframes pet-fade-in {
      0% {
        opacity: 0;
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
      }
      100% {
        opacity: 1;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    }

    /* ========== REALM THEME STYLES ========== */
    /* ========== REALM THEME STYLES ========== */
    .pet-panel[data-realm="启灵"] {
      --realm-color-primary: #ff4757;
      --realm-color-secondary: #ff6b81;
      --realm-glow-opacity: 0.18;
      --realm-spin-speed-outer: 40s;
      --realm-spin-speed-inner: 15s;
      --realm-float-speed: 8s;
      --realm-burst-spread: 50px;
      --realm-glow-color: rgba(255, 71, 87, 0.35);
      --realm-conic-glow: rgba(255, 71, 87, 0.08);
      --realm-conic-glow-alt: rgba(255, 107, 129, 0.06);
      --realm-cabin-glow-primary: rgba(255, 71, 87, 0.03);
      --realm-cabin-glow-secondary: rgba(255, 107, 129, 0.03);
    }
    .pet-panel[data-realm="炼气"] {
      --realm-color-primary: #ff7f50;
      --realm-color-secondary: #ffa502;
      --realm-glow-opacity: 0.22;
      --realm-spin-speed-outer: 30s;
      --realm-spin-speed-inner: 11s;
      --realm-float-speed: 6s;
      --realm-burst-spread: 70px;
      --realm-glow-color: rgba(255, 127, 80, 0.4);
      --realm-conic-glow: rgba(255, 127, 80, 0.1);
      --realm-conic-glow-alt: rgba(255, 165, 2, 0.08);
      --realm-cabin-glow-primary: rgba(255, 127, 80, 0.05);
      --realm-cabin-glow-secondary: rgba(255, 165, 2, 0.05);
    }
    .pet-panel[data-realm="筑基"] {
      --realm-color-primary: #f1c40f;
      --realm-color-secondary: #f39c12;
      --realm-glow-opacity: 0.25;
      --realm-spin-speed-outer: 25s;
      --realm-spin-speed-inner: 8s;
      --realm-float-speed: 5s;
      --realm-burst-spread: 90px;
      --realm-glow-color: rgba(241, 196, 15, 0.45);
      --realm-conic-glow: rgba(241, 196, 15, 0.12);
      --realm-conic-glow-alt: rgba(243, 190, 18, 0.09);
      --realm-cabin-glow-primary: rgba(241, 196, 15, 0.06);
      --realm-cabin-glow-secondary: rgba(243, 190, 18, 0.06);
    }
    .pet-panel[data-realm="结丹"] {
      --realm-color-primary: #2ecc71;
      --realm-color-secondary: #1abc9c;
      --realm-glow-opacity: 0.28;
      --realm-spin-speed-outer: 18s;
      --realm-spin-speed-inner: 6s;
      --realm-float-speed: 4s;
      --realm-burst-spread: 110px;
      --realm-glow-color: rgba(46, 204, 113, 0.5);
      --realm-conic-glow: rgba(46, 204, 113, 0.15);
      --realm-conic-glow-alt: rgba(26, 188, 156, 0.12);
      --realm-cabin-glow-primary: rgba(46, 204, 113, 0.08);
      --realm-cabin-glow-secondary: rgba(26, 188, 156, 0.08);
    }
    .pet-panel[data-realm="元婴"] {
      --realm-color-primary: #3498db;
      --realm-color-secondary: #54a0ff;
      --realm-glow-opacity: 0.32;
      --realm-spin-speed-outer: 12s;
      --realm-spin-speed-inner: 4s;
      --realm-float-speed: 3.5s;
      --realm-burst-spread: 130px;
      --realm-glow-color: rgba(52, 152, 219, 0.55);
      --realm-conic-glow: rgba(52, 152, 219, 0.18);
      --realm-conic-glow-alt: rgba(84, 160, 255, 0.15);
      --realm-cabin-glow-primary: rgba(52, 152, 219, 0.1);
      --realm-cabin-glow-secondary: rgba(84, 160, 255, 0.1);
    }
    .pet-panel[data-realm="化神"] {
      --realm-color-primary: #9b59b6;
      --realm-color-secondary: #a55eea;
      --realm-glow-opacity: 0.42;
      --realm-spin-speed-outer: 7s;
      --realm-spin-speed-inner: 2.2s;
      --realm-float-speed: 2.5s;
      --realm-burst-spread: 160px;
      --realm-glow-color: rgba(155, 89, 182, 0.7);
      --realm-conic-glow: rgba(155, 89, 182, 0.25);
      --realm-conic-glow-alt: rgba(165, 94, 234, 0.22);
      --realm-cabin-glow-primary: rgba(155, 89, 182, 0.15);
      --realm-cabin-glow-secondary: rgba(165, 94, 234, 0.15);
    }

    .pet-panel-mask {
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 18, 0);
      z-index: 500;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      animation: pet-mask-fade-in 0.3s ease forwards;
    }
    .pet-panel {
      width: min(440px, calc(100vw - 32px));
      height: fit-content;
      max-height: min(720px, 90vh);
      overflow-y: auto;
      background: var(--pet-panel-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45), inset 0 0 32px var(--realm-cabin-glow-primary), inset 0 0 60px var(--realm-cabin-glow-secondary);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
      scrollbar-width: none;
      text-align: left;
      transform-origin: center;
      animation: summon-cabin 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .pet-panel::-webkit-scrollbar {
      display: none;
    }
    .pet-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .pet-panel-eyebrow {
      color: var(--accent2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .pet-panel-head h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--strong-text);
      margin: 0 0 6px 0;
    }
    .pet-panel-head p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
    }
    .pet-panel-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pet-panel-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      transform: rotate(90deg);
    }

    .pet-zenith-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 10px 0;
      position: relative;
    }
    .pet-zenith-avatar-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      animation: aura-burst 1.2s cubic-bezier(0.1, 0.8, 0.2, 1) both;
      animation-delay: 0.4s;
    }
    /* 境界切换爆发光层 */
    .pet-realm-burst {
      position: absolute;
      left: 50%;
      top: 50%;
      translate: -50% -50%;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transform-origin: center center;
    }
    /* 境界背景光效 Canvas */
    .pet-aura-bg-canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      translate: -50% -50%;
      width: 340px;
      height: 340px;
      z-index: 0;
      pointer-events: none;
      border-radius: 50%;
    }
    .pet-zenith-avatar-wrapper::before {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      border: 1px dashed var(--realm-color-primary);
      border-radius: 50%;
      animation: rotate-star var(--realm-spin-speed-outer) linear infinite;
      z-index: 0;
      box-shadow: 0 0 15px var(--realm-glow-color);
      opacity: 0.8;
    }
    .pet-zenith-avatar-wrapper::after {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, var(--realm-conic-glow-alt) 0%, transparent 70%),
                  conic-gradient(from 0deg, transparent 0%, var(--realm-conic-glow) 30%, transparent 60%, var(--realm-conic-glow-alt) 80%, transparent 100%);
      border-radius: 50%;
      border: 1px solid rgba(108, 99, 255, 0.06);
      animation: reverse-rotate-aura var(--realm-spin-speed-inner) linear infinite, aura-breathe 4s ease-in-out infinite;
      z-index: 0;
    }
    .pet-aura-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      z-index: 1;
      overflow: visible;
    }
    .pet-aura-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.03);
      stroke-width: 3px;
    }
    :root[data-theme="light"] .pet-aura-ring-bg {
      stroke: rgba(0, 0, 0, 0.03);
    }
    .pet-aura-ring-fill {
      fill: none;
      stroke: url(#aura-gradient);
      stroke-width: 3px;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 8px var(--realm-color-primary)) drop-shadow(0 0 15px var(--realm-color-secondary));
    }
    .pet-zenith-avatar {
      width: 180px;
      height: 180px;
      object-fit: contain;
      z-index: 2;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.22));
      transition: all 0.3s ease;
      animation: summon-avatar 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 float-avatar var(--realm-float-speed) ease-in-out infinite 0.9s;
    }

    /* ========== GSAP 法碟底座 ========== */
    .pet-pedestal-gsap {
      position: relative;
      width: 240px;
      margin: -20px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }
    .ped-svg {
      width: 240px;
      height: 60px;
      overflow: visible;
      filter: drop-shadow(0 0 6px var(--realm-col, #4ecdc4));
    }
    /* 元婴脉冲涟漪 */
    .ped-pulse-wave {
      position: absolute;
      left: 50%;
      top: 50%;
      translate: -50% -50%;
      width: 140px;
      height: 36px;
      border: 1.5px solid var(--realm-col, #3498db);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 0 10px var(--realm-col, #3498db);
    }
    /* 化神粒子 Canvas */
    .ped-particle-canvas {
      position: absolute;
      left: 50%;
      bottom: 10px;
      translate: -50% 0;
      pointer-events: none;
      z-index: 4;
    }

    .pet-zenith-metrics {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      color: var(--text2);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .pet-zenith-metrics span {
      display: inline-flex;
      align-items: center;
    }
    .pet-zenith-metrics strong {
      color: var(--text);
      font-weight: 700;
      margin-left: 3px;
    }
    .pet-zenith-metrics .separator {
      color: var(--border);
      font-size: 10px;
    }

    .pet-preview-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      background: rgba(237, 137, 54, 0.15);
      border: 1px solid rgba(237, 137, 54, 0.3);
      color: var(--warning);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
      width: fit-content;
    }
    .pet-preview-reset-btn {
      margin-top: 8px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
    }
    .pet-preview-reset-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(78, 205, 196, 0.05);
    }

    .pet-ladder-container {
      width: 100%;
      margin: 20px 0;
      position: relative;
    }
    .pet-ladder-line {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 14px;
      height: 1px;
      background: var(--border);
      z-index: 0;
    }
    .pet-ladder {
      display: flex;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .pet-ladder-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex: 1;
      opacity: 0.3;
      transition: all 0.3s ease;
    }
    .pet-ladder-node.unlocked {
      opacity: 0.75;
    }
    .pet-ladder-node.active {
      opacity: 1;
      transform: scale(1.05);
    }
    .pet-ladder-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text2);
      border: 2px solid var(--pet-panel-bg);
      box-sizing: content-box;
      transition: all 0.3s ease;
    }
    .pet-ladder-node.unlocked .pet-ladder-dot {
      background: var(--accent2);
    }
    .pet-ladder-node.active .pet-ladder-dot {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      transform: scale(1.2);
    }
    .pet-ladder-node span {
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
    }
    .pet-ladder-node.unlocked span {
      color: var(--text);
    }
    .pet-ladder-node.active span {
      color: var(--accent2);
      font-weight: 800;
    }

    .pet-codex-trigger-btn {
      display: block;
      margin: 12px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.06em;
    }
    .pet-codex-trigger-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(78, 205, 196, 0.04);
    }

    .pet-codex-overlay {
      position: fixed;
      inset: 0;
      background: var(--pet-codex-bg);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      z-index: 600;
      display: flex;
      flex-direction: column;
      padding: 40px;
      overflow-y: auto;
      animation: pet-fade-in 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    .pet-codex-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .pet-codex-head h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--strong-text);
      margin: 0;
    }
    .pet-codex-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px;
    }
    .pet-codex-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.25;
      text-align: center;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .pet-codex-card.unlocked {
      opacity: 0.85;
    }
    .pet-codex-card.unlocked:hover {
      opacity: 1;
      transform: translateY(-2px);
      border-color: var(--accent2);
    }
    .pet-codex-card.active {
      opacity: 1;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.15);
      background: radial-gradient(circle, rgba(108, 99, 255, 0.06) 0%, var(--surface2) 100%);
    }
    .pet-codex-card img {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }
    .pet-codex-card:not(.unlocked) img {
      filter: grayscale(100%) opacity(40%);
    }
    .pet-codex-card strong {
      font-size: 12px;
      color: var(--text);
    }
    .pet-codex-card.unlocked strong {
      color: var(--accent2);
    }
    .pet-codex-card span {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.3;
    }
    .pet-codex-card.unlocked span {
      color: var(--text);
    }

    .pet-ticker-container {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 10px;
    }
    .pet-ticker {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text2);
      line-height: 1.4;
      background: var(--surface2);
      padding: 8px 12px;
      border-radius: 8px;
    }
    .pet-ticker-icon {
      color: var(--accent2);
      font-weight: 800;
      flex-shrink: 0;
    }
    .pet-ticker-content {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    /* ========== CAPABILITY ROADMAP ========== */
    .roadmap-page {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 26px;
    }
    .roadmap-hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .roadmap-kicker {
      color: var(--accent2);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .roadmap-hero h1 {
      font-size: 30px;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .roadmap-hero p {
      max-width: 680px;
      color: var(--text2);
      line-height: 1.7;
      font-size: 14px;
    }
    .roadmap-hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .roadmap-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .roadmap-summary-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px;
      display: grid;
      gap: 6px;
    }
    .roadmap-summary-card.emphasis {
      border-color: rgba(78,205,196,.45);
      background: linear-gradient(135deg, rgba(78,205,196,.12), rgba(108,99,255,.08)), var(--surface);
    }
    .roadmap-summary-card .summary-label {
      color: var(--text2);
      font-size: 12px;
      font-weight: 700;
    }
    .roadmap-summary-card strong {
      color: var(--text);
      font-size: 24px;
      line-height: 1.2;
    }
    .roadmap-summary-card span:last-child {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
    }
    .roadmap-principles {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .principle-item {
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      background: var(--surface);
      color: var(--text2);
      padding: 13px 14px;
      font-size: 13px;
      line-height: 1.7;
    }
    .roadmap-section {
      display: grid;
      gap: 16px;
    }
    .roadmap-section-header h2 {
      font-size: 21px;
      margin-bottom: 6px;
    }
    .roadmap-section-header p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.7;
    }
    .capability-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .capability-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .capability-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .capability-card h3 {
      font-size: 17px;
      line-height: 1.35;
    }
    .capability-card-top span {
      color: var(--accent2);
      font-size: 18px;
      font-weight: 800;
    }
    .capability-target {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.7;
    }
    .capability-progress {
      height: 5px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .capability-progress div {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .capability-meta,
    .capability-focus {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .capability-meta span,
    .capability-focus span {
      border-radius: 999px;
      background: var(--surface2);
      color: var(--text2);
      padding: 4px 9px;
      font-size: 12px;
    }
    .capability-signals {
      display: grid;
      gap: 6px;
      color: var(--text2);
      font-size: 12px;
      line-height: 1.6;
    }
    .capability-signals div::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--accent2);
      vertical-align: 1px;
    }
    .capability-docs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 2px;
    }
    .capability-docs button {
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      line-height: 1.4;
      padding: 5px 8px;
      max-width: 100%;
      text-align: left;
    }
    .capability-docs button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .capability-docs span {
      color: var(--text2);
      font-size: 12px;
    }
    .capability-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 2px;
    }
    .roadmap-phase-list {
      display: grid;
      gap: 10px;
    }
    .roadmap-phase {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 14px;
    }
    .phase-index {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface2);
      color: var(--accent2);
      font-weight: 800;
    }
    .phase-body h3 {
      font-size: 15px;
      margin-bottom: 4px;
    }
    .phase-body p,
    .phase-output {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.6;
    }
    .phase-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .phase-actions span {
      background: var(--surface2);
      border-radius: 999px;
      color: var(--text2);
      font-size: 12px;
      padding: 3px 8px;
    }
    .followup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .followup-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 15px;
    }
    .followup-card h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }
    .followup-card p {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.65;
      margin-bottom: 8px;
    }

    /* ========== TECH BREAKER CANVAS ========== */
    .breaker-page {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .breaker-toolbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }
    .breaker-title {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    .breaker-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .map-tool-btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--text2);
      padding: 8px 11px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      transition: all .18s;
      box-shadow: 0 8px 24px rgba(0,0,0,.16);
    }
    .map-tool-btn:hover {
      border-color: var(--accent2);
      color: var(--text);
    }
    .canvas-viewport {
      position: relative;
      flex: 1;
      min-height: 100%;
      overflow: hidden;
      border: none;
      border-radius: 0;
      background:
        radial-gradient(circle at 1px 1px, rgba(136,146,170,.13) 1px, transparent 0) 0 0 / 26px 26px,
        var(--surface);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .canvas-viewport:active { cursor: grabbing; }
    .canvas-world {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .canvas-edges {
      position: absolute;
      overflow: visible;
      pointer-events: none;
    }
    .canvas-edge {
      fill: none;
      stroke: rgba(136,146,170,.34);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }
    .canvas-edge-label {
      fill: var(--text2);
      font-size: 12px;
      paint-order: stroke;
      stroke: var(--surface);
      stroke-width: 4px;
    }
    .canvas-node {
      position: absolute;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: color-mix(in srgb, var(--surface2) 82%, transparent);
      color: var(--text);
      padding: 10px 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.14);
      cursor: grab;
      backdrop-filter: blur(4px);
    }
    .canvas-node:active { cursor: grabbing; }
    .canvas-node.clickable { cursor: pointer; }
    .canvas-node.clickable:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(78,205,196,.13), 0 10px 26px rgba(0,0,0,.22);
    }
    .canvas-node-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }
    .canvas-node-text {
      white-space: pre-wrap;
      margin-top: 7px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text2);
    }
    .canvas-node.color-1 { border-color: rgba(49,94,251,.34); background: rgba(49,94,251,.09); }
    .canvas-node.color-2 { border-color: rgba(72,187,120,.34); background: rgba(72,187,120,.09); }
    .canvas-node.color-3 { border-color: rgba(237,137,54,.34); background: rgba(237,137,54,.09); }
    .canvas-node.color-4 { border-color: rgba(78,205,196,.34); background: rgba(78,205,196,.09); }
    .canvas-node.color-5 { border-color: rgba(108,99,255,.38); background: rgba(108,99,255,.1); }
    .canvas-node.color-6 { border-color: rgba(136,146,170,.34); background: rgba(136,146,170,.08); }
    .breaker-card-wrap .done-banner { align-items: flex-start; }

    /* ========== ARTICLE ========== */
    .article-shell {
      display: grid;
      grid-template-columns: minmax(0, 800px) 220px;
      gap: 28px;
      align-items: start;
      justify-content: center;
      max-width: 1080px;
      margin: 0 auto;
    }
    .article-wrap { max-width: 800px; margin: 0 auto; }
    .article-shell .article-wrap {
      width: 100%;
      max-width: 800px;
      margin: 0;
    }
    .article-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .article-breadcrumb {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .article-breadcrumb span { cursor: pointer; }
    .article-breadcrumb span:hover { color: var(--accent); }
    .article-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .article-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .article-tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text2);
    }
    .article-tag.accent { background: rgba(108,99,255,.2); color: var(--accent); }
    .article-tag.source { background: rgba(72,187,120,.13); color: var(--success); }
    .article-source-card {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      display: grid;
      gap: 6px;
    }
    .article-source-card div {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }
    .article-source-card span { color: var(--text3); }
    .article-source-card a {
      color: var(--accent);
      overflow-wrap: anywhere;
      text-decoration: none;
    }
    .article-source-card a:hover { text-decoration: underline; }
    .article-toc {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 104px);
      overflow-y: auto;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      padding: 12px 0 12px 16px;
      border-left: 1px solid var(--border);
      color: var(--text2);
    }
    .article-toc.is-scrolling {
      scrollbar-color: var(--border) transparent;
    }
    .article-toc::-webkit-scrollbar {
      width: 6px;
    }
    .article-toc::-webkit-scrollbar-track {
      background: transparent;
    }
    .article-toc::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    .article-toc.is-scrolling::-webkit-scrollbar-thumb {
      background: var(--border);
    }
    .article-toc.is-scrolling::-webkit-scrollbar-thumb:hover {
      background: var(--text2);
    }
    .article-toc-title {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }
    .article-toc-list {
      display: grid;
      gap: 2px;
    }
    .article-toc-item {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 8px;
      text-align: left;
      transition: color .15s, background .15s;
    }
    .article-toc-item.depth-3 { padding-left: 20px; font-size: 11px; }
    .article-toc-item:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .article-toc-item.active {
      background: rgba(108,99,255,.14);
      color: var(--accent);
      font-weight: 700;
    }

    /* Markdown 内容 */
    .md-body { line-height: 1.8; font-size: 15px; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      margin: 1.8em 0 .8em;
      font-weight: 600;
      line-height: 1.3;
    }
    .md-body h2 { font-size: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 16px; }
    .md-body h1[id], .md-body h2[id], .md-body h3[id], .md-body h4[id] { scroll-margin-top: 24px; }
    .md-body p { margin-bottom: 1em; }
    .md-body ul, .md-body ol { padding-left: 1.6em; margin-bottom: 1em; }
    .md-body li { margin-bottom: .4em; }
    .md-body code {
      background: var(--surface2);
      color: var(--code-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .md-body pre {
      background: var(--code-bg);
      color: var(--code-text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    .md-body pre code,
    .md-body pre code.hljs,
    .md-body pre .hljs {
      background: transparent;
      color: var(--code-text);
      padding: 0;
    }
    .md-body pre code.language-txt,
    .md-body pre code.language-text,
    .md-body pre code.language-plain,
    .md-body pre code.language-plaintext {
      color: var(--code-text);
    }
    .md-body pre .hljs-comment,
    .md-body pre .hljs-quote {
      color: var(--syntax-comment);
    }
    .md-body pre .hljs-doctag,
    .md-body pre .hljs-keyword,
    .md-body pre .hljs-meta .hljs-keyword,
    .md-body pre .hljs-template-tag,
    .md-body pre .hljs-template-variable,
    .md-body pre .hljs-type,
    .md-body pre .hljs-variable.language_ {
      color: var(--syntax-keyword);
    }
    .md-body pre .hljs-title,
    .md-body pre .hljs-title.class_,
    .md-body pre .hljs-title.class_.inherited__,
    .md-body pre .hljs-title.function_ {
      color: var(--syntax-title);
    }
    .md-body pre .hljs-attr,
    .md-body pre .hljs-attribute,
    .md-body pre .hljs-literal,
    .md-body pre .hljs-meta,
    .md-body pre .hljs-number,
    .md-body pre .hljs-operator,
    .md-body pre .hljs-variable,
    .md-body pre .hljs-selector-attr,
    .md-body pre .hljs-selector-class,
    .md-body pre .hljs-selector-id {
      color: var(--syntax-constant);
    }
    .md-body pre .hljs-regexp,
    .md-body pre .hljs-string,
    .md-body pre .hljs-meta .hljs-string {
      color: var(--syntax-string);
    }
    .md-body pre .hljs-built_in,
    .md-body pre .hljs-symbol {
      color: var(--syntax-variable);
    }
    .md-body pre .hljs-name,
    .md-body pre .hljs-selector-tag,
    .md-body pre .hljs-selector-pseudo {
      color: var(--syntax-tag);
    }
    .md-body pre .hljs-subst,
    .md-body pre .hljs-emphasis,
    .md-body pre .hljs-strong {
      color: var(--code-text);
    }
    .md-body pre .hljs-emphasis { font-style: italic; }
    .md-body pre .hljs-strong { font-weight: 700; }
    .md-body pre .hljs-section {
      color: var(--syntax-section);
      font-weight: 700;
    }
    .md-body pre .hljs-bullet { color: var(--syntax-bullet); }
    .md-body pre .hljs-addition {
      color: var(--syntax-addition);
      background-color: var(--syntax-addition-bg);
    }
    .md-body pre .hljs-deletion {
      color: var(--syntax-deletion);
      background-color: var(--syntax-deletion-bg);
    }
    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1em;
      color: var(--text);
    }
    .md-body table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    .md-body th, .md-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 13px;
    }
    .md-body th { background: var(--surface2); }
    .md-body strong { color: var(--strong-text); }
    .md-body mark {
      background: var(--mark-bg);
      color: var(--mark-text);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body a.doc-ref {
      color: var(--accent);
      text-decoration: none;
      opacity: .75;
      font-size: .9em;
    }
    .md-body a.doc-ref:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }
    .article-nav-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      color: var(--text2);
      text-align: left;
    }
    .article-nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .article-nav-btn.right { text-align: right; }
    .article-nav-btn .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .article-nav-btn .title { font-weight: 600; color: var(--text); }

    .done-banner {
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(72,187,120,.1);
      border: 1px solid rgba(72,187,120,.3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .done-banner-text { font-size: 14px; color: var(--success); }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ========== IMMERSIVE READING MODE ========== */
    html[data-immersive="true"] .nav { display: none; }
    html[data-immersive="true"] .main { height: 100vh; }
    html[data-immersive="true"] .sidebar { display: none; }
    html[data-immersive="true"] .content { padding: 48px 80px; }
    html[data-immersive="true"] .article-shell {
      grid-template-columns: minmax(0, 900px) 220px;
      max-width: 1180px;
    }
    html[data-immersive="true"] .article-wrap { max-width: 900px; }
    html[data-immersive="true"] .md-body { font-size: 16px; line-height: 2; }

    .immersive-toolbar {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 7px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      font-size: 13px;
      color: var(--text2);
      animation: immersiveFadeIn .2s ease;
      transition: opacity .4s ease, transform .4s ease;
    }
    .immersive-toolbar.hidden {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }
    .immersive-toolbar-sep {
      width: 1px;
      height: 14px;
      background: var(--border);
    }
    .immersive-toolbar-exit {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 0;
    }
    .immersive-toolbar-exit:hover { color: var(--accent); }
    .immersive-toolbar kbd {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
    }
    .immersive-toggle-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      transition: all .15s;
      white-space: nowrap;
    }
    .immersive-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    @keyframes immersiveFadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== QUIZ ========== */
    .quiz-wrap { max-width: 760px; margin: 0 auto; }
    .quiz-header {
      margin-bottom: 28px;
    }
    .quiz-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .quiz-header p { font-size: 13px; color: var(--text2); }
    .quiz-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .quiz-question {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .quiz-question-num {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .quiz-question-context {
      width: fit-content;
      max-width: 100%;
      margin: -2px 0 12px;
      padding: 5px 9px;
      border: 1px solid rgba(108,99,255,.18);
      border-radius: 6px;
      background: rgba(108,99,255,.07);
      color: var(--text2);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .quiz-question-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      font-size: 14px;
      line-height: 1.5;
    }
    .quiz-option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .quiz-option.selected { border-color: var(--accent); background: rgba(108,99,255,.15); }
    .quiz-option.correct { border-color: var(--success); background: rgba(72,187,120,.1); }
    .quiz-option.wrong { border-color: var(--danger); background: rgba(252,129,129,.1); }
    .quiz-option.disabled { cursor: default; }
    .quiz-option .opt-key {
      min-width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-option.selected .opt-key { background: var(--accent); color: #fff; }
    .quiz-option.correct .opt-key { background: var(--success); color: #fff; }
    .quiz-option.wrong .opt-key { background: var(--danger); color: #fff; }
    .quiz-option-content {
      min-width: 0;
      flex: 1;
      overflow-wrap: anywhere;
    }
    .quiz-option-content p { margin: 0; }
    .quiz-option-content code {
      padding: 2px 5px;
      border-radius: 5px;
      background: var(--code-bg);
      color: var(--code-text);
      font-size: .92em;
    }
    .quiz-option-content pre {
      margin: 8px 0 0;
      padding: 10px;
      border-radius: 8px;
      background: var(--code-bg);
      color: var(--code-text);
      overflow-x: auto;
      white-space: pre;
    }
    .quiz-option-content pre code {
      padding: 0;
      background: transparent;
      color: inherit;
      font-size: 12px;
    }
    .quiz-explain {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(108,99,255,.08);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      display: none;
    }
    .quiz-explain.show { display: block; }
    .quiz-explain strong { color: var(--text); }
    .quiz-explain-text { margin-top: 6px; }
    .quiz-explain-text p { margin: 6px 0; }
    .quiz-explain-text ul,
    .quiz-explain-text ol {
      margin: 8px 0 0 18px;
      display: grid;
      gap: 4px;
    }
    .quiz-explain-text li { padding-left: 2px; }
    .recommended-reading {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(108,99,255,.18);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .reading-link {
      border: none;
      background: transparent;
      color: var(--accent2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 0;
    }
    .reading-link:hover { text-decoration: underline; }
    .quiz-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .quiz-result {
      text-align: center;
      padding: 40px 20px;
    }
    .quiz-result .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .quiz-result .score-num { font-size: 32px; font-weight: 700; color: var(--accent); }
    .quiz-result .score-label { font-size: 12px; color: var(--text2); }
    .quiz-result h3 { font-size: 22px; margin-bottom: 8px; }
    .quiz-result p { color: var(--text2); margin-bottom: 24px; }
    .quiz-result .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ========== DRILL ========== */
    .drill-wrap { max-width: 760px; margin: 0 auto; }
    .drill-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .drill-header h2 { font-size: 22px; font-weight: 700; }
    .drill-stats {
      display: flex;
      gap: 20px;
    }
    .drill-stat { text-align: center; }
    .drill-stat .val { font-size: 20px; font-weight: 700; color: var(--accent); }
    .drill-stat .lbl { font-size: 12px; color: var(--text2); }

    /* ========== MODULE SELECT ========== */
    .module-select-page { max-width: 700px; margin: 0 auto; }
    .module-select-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .module-select-page p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
    .module-select-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .module-select-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .module-select-card:hover { border-color: var(--accent); }
    .module-select-card.selected { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .module-select-card .icon { font-size: 24px; margin-bottom: 8px; }
    .module-select-card .name { font-size: 14px; font-weight: 600; }
    .module-select-card .count { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .module-card-actions {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .mini-btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      border-radius: 7px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .mini-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .mini-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .mini-btn.primary:hover { background: #5a52d5; color: #fff; }
    .mini-btn.ghost { background: transparent; }

    .wrongbook-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .wrongbook-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .wrongbook-item-title {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 4px;
    }
    .wrongbook-item-meta {
      font-size: 12px;
      color: var(--text2);
    }

    /* ========== MISC ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-easy { background: rgba(72,187,120,.15); color: var(--success); }
    .badge-medium { background: rgba(237,137,54,.15); color: var(--warning); }
    .badge-hard { background: rgba(252,129,129,.15); color: var(--danger); }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 400;
      pointer-events: none;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ========== 答题卡 ========== */
    .answer-card-sidebar {
      display: none;
      width: 220px;
      min-width: 220px;
      height: 100%;
      max-height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease, min-width .2s ease;
    }
    .answer-card-sidebar.collapsed {
      width: 42px;
      min-width: 42px;
    }
    .ac-collapsed-bar {
      display: none;
      height: 100%;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text2);
      cursor: pointer;
      writing-mode: vertical-rl;
      user-select: none;
    }
    .answer-card-sidebar.collapsed .ac-collapsed-bar { display: flex; }
    .answer-card-sidebar.collapsed .ac-inner { display: none; }
    .ac-collapsed-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
    }
    .ac-inner {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }
    .ac-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .ac-progress-text {
      margin-top: 2px;
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
    }
    .ac-toggle-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .ac-toggle-btn:hover { color: var(--text); border-color: var(--text); }
    .answer-card-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }
    .answer-card-page + .answer-card-page {
      margin-top: 10px;
    }
    .answer-card-page-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .answer-card-page-label.current {
      color: var(--accent2);
    }
    .answer-card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ac-cell {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .ac-cell.unanswered {
      background: var(--surface2);
      color: var(--text2);
      border-color: var(--border);
    }
    .ac-cell.selected-unsub {
      background: rgba(108,99,255,.2);
      color: var(--accent);
      border-color: var(--accent);
    }
    .ac-cell.correct {
      background: rgba(72,187,120,.18);
      color: var(--success);
      border-color: var(--success);
    }
    .ac-cell.wrong {
      background: rgba(252,129,129,.18);
      color: var(--danger);
      border-color: var(--danger);
    }
    .ac-cell.is-current-page {
      box-shadow: inset 0 0 0 1px var(--accent2);
    }
    .ac-cell:hover { filter: brightness(1.2); }
    .answer-card-summary {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      font-size: 12px;
      color: var(--text2);
    }
    .ac-sum-item { display: flex; align-items: center; gap: 6px; }
    .ac-sum-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }

    @media (max-width: 1180px) {
      .article-shell { display: block; max-width: 800px; }
      .article-toc { display: none; }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px 72px; }
      .nav { padding: 0 12px; }
      .nav-logo { margin-right: 6px; font-size: 14px; }
      .nav-tabs { overflow-x: auto; }
      .nav-tab { padding: 6px 9px; white-space: nowrap; }
      .theme-toggle-btn { padding: 6px 10px; font-size: 12px; }
      .home-entry-grid { grid-template-columns: 1fr; }
      .content-map { padding: 0; }
      .breaker-toolbar { top: 10px; left: 10px; right: 10px; }
      .breaker-title { padding: 7px 10px; font-size: 13px; }
      .map-tool-btn { padding: 7px 9px; }
      .canvas-viewport { min-height: calc(100vh - 56px); }
      .wrongbook-item { align-items: flex-start; flex-direction: column; }
      .answer-card-sidebar,
      .answer-card-sidebar.collapsed {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 150;
        width: 100%;
        min-width: 0;
        height: min(68vh, 460px);
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(calc(100% - 44px));
        transition: transform .24s ease;
      }
      .answer-card-sidebar.open {
        transform: translateY(0);
      }
      .answer-card-sidebar .ac-collapsed-bar,
      .answer-card-sidebar.collapsed .ac-collapsed-bar {
        display: flex;
        height: 44px;
        flex-direction: row;
        writing-mode: horizontal-tb;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .answer-card-sidebar .ac-inner,
      .answer-card-sidebar.collapsed .ac-inner {
        display: flex;
        height: calc(100% - 44px);
      }
      .answer-card-sidebar .ac-header { display: none; }
      .answer-card-body { padding: 12px 14px; }
      .answer-card-summary { padding: 10px 14px; grid-template-columns: repeat(4, max-content); }
    }
  </style>
</head>
<body>

<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
