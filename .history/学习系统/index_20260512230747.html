<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>前端知识学习系统</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #4ecdc4;
      --text: #e2e8f0;
      --text2: #8892aa;
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #fc8181;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== NAV ========== */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      margin-right: 16px;
      white-space: nowrap;
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all .2s;
      border: none;
      background: transparent;
    }
    .nav-tab:hover { background: var(--surface2); color: var(--text); }
    .nav-tab.active { background: var(--accent); color: #fff; }

    /* ========== LAYOUT ========== */
    .main { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 56px); }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }
    .sidebar-module {
      margin-bottom: 4px;
    }
    .sidebar-module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .04em;
      user-select: none;
    }
    .sidebar-module-header:hover { color: var(--text); }
    .sidebar-module-header .chevron {
      margin-left: auto;
      transition: transform .2s;
      font-size: 10px;
    }
    .sidebar-module-header.open .chevron { transform: rotate(90deg); }
    .sidebar-module-list { display: none; }
    .sidebar-module-list.open { display: block; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px 9px 28px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active {
      background: rgba(108, 99, 255, .12);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .sidebar-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sidebar-item.done .dot { background: var(--success); }
    .sidebar-item .item-idx {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }

    /* ========== CONTENT AREA ========== */
    .content { flex: 1; overflow-y: auto; padding: 32px 48px; }

    /* ========== HOME ========== */
    .home { max-width: 900px; margin: 0 auto; }
    .home-hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .home-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .home-hero p { color: var(--text2); font-size: 15px; }
    .module-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }
    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
    }
    .module-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,.15);
    }
    .module-card-icon { font-size: 28px; margin-bottom: 12px; }
    .module-card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .module-card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .module-card-progress {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width .4s;
    }
    .progress-text { font-size: 12px; color: var(--text2); }

    /* ========== ARTICLE ========== */
    .article-wrap { max-width: 800px; margin: 0 auto; }
    .article-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .article-breadcrumb {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .article-breadcrumb span { cursor: pointer; }
    .article-breadcrumb span:hover { color: var(--accent); }
    .article-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .article-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .article-tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text2);
    }
    .article-tag.accent { background: rgba(108,99,255,.2); color: var(--accent); }

    /* Markdown 内容 */
    .md-body { line-height: 1.8; font-size: 15px; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      margin: 1.8em 0 .8em;
      font-weight: 600;
      line-height: 1.3;
    }
    .md-body h2 { font-size: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 16px; }
    .md-body p { margin-bottom: 1em; }
    .md-body ul, .md-body ol { padding-left: 1.6em; margin-bottom: 1em; }
    .md-body li { margin-bottom: .4em; }
    .md-body code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .md-body pre {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    .md-body pre code { background: none; padding: 0; }
    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: rgba(108,99,255,.08);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1em;
      color: var(--text2);
    }
    .md-body table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    .md-body th, .md-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 13px;
    }
    .md-body th { background: var(--surface2); }
    .md-body strong { color: #fff; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }

    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }
    .article-nav-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      color: var(--text2);
      text-align: left;
    }
    .article-nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .article-nav-btn.right { text-align: right; }
    .article-nav-btn .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .article-nav-btn .title { font-weight: 600; color: var(--text); }

    .done-banner {
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(72,187,120,.1);
      border: 1px solid rgba(72,187,120,.3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .done-banner-text { font-size: 14px; color: var(--success); }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ========== QUIZ ========== */
    .quiz-wrap { max-width: 760px; margin: 0 auto; }
    .quiz-header {
      margin-bottom: 28px;
    }
    .quiz-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .quiz-header p { font-size: 13px; color: var(--text2); }
    .quiz-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .quiz-question {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .quiz-question-num {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .quiz-question-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      font-size: 14px;
      line-height: 1.5;
    }
    .quiz-option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .quiz-option.selected { border-color: var(--accent); background: rgba(108,99,255,.15); }
    .quiz-option.correct { border-color: var(--success); background: rgba(72,187,120,.1); }
    .quiz-option.wrong { border-color: var(--danger); background: rgba(252,129,129,.1); }
    .quiz-option.disabled { cursor: default; }
    .quiz-option .opt-key {
      min-width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-option.selected .opt-key { background: var(--accent); color: #fff; }
    .quiz-option.correct .opt-key { background: var(--success); color: #fff; }
    .quiz-option.wrong .opt-key { background: var(--danger); color: #fff; }
    .quiz-explain {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(108,99,255,.08);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      display: none;
    }
    .quiz-explain.show { display: block; }
    .quiz-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .quiz-result {
      text-align: center;
      padding: 40px 20px;
    }
    .quiz-result .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .quiz-result .score-num { font-size: 32px; font-weight: 700; color: var(--accent); }
    .quiz-result .score-label { font-size: 12px; color: var(--text2); }
    .quiz-result h3 { font-size: 22px; margin-bottom: 8px; }
    .quiz-result p { color: var(--text2); margin-bottom: 24px; }
    .quiz-result .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ========== DRILL ========== */
    .drill-wrap { max-width: 760px; margin: 0 auto; }
    .drill-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .drill-header h2 { font-size: 22px; font-weight: 700; }
    .drill-stats {
      display: flex;
      gap: 20px;
    }
    .drill-stat { text-align: center; }
    .drill-stat .val { font-size: 20px; font-weight: 700; color: var(--accent); }
    .drill-stat .lbl { font-size: 12px; color: var(--text2); }

    /* ========== MODULE SELECT ========== */
    .module-select-page { max-width: 700px; margin: 0 auto; }
    .module-select-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .module-select-page p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
    .module-select-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .module-select-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .module-select-card:hover { border-color: var(--accent); }
    .module-select-card.selected { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .module-select-card .icon { font-size: 24px; margin-bottom: 8px; }
    .module-select-card .name { font-size: 14px; font-weight: 600; }
    .module-select-card .count { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* ========== MISC ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-easy { background: rgba(72,187,120,.15); color: var(--success); }
    .badge-medium { background: rgba(237,137,54,.15); color: var(--warning); }
    .badge-hard { background: rgba(252,129,129,.15); color: var(--danger); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ========== 答题卡 ========== */
    .answer-card-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .answer-card-btn:hover { border-color: var(--accent); color: var(--accent); }
    .answer-card-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: none;
    }
    .answer-card-overlay.open { display: block; }
    .answer-card-panel {
      position: fixed;
      top: 56px; right: 0;
      width: 320px;
      height: calc(100vh - 56px);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease;
    }
    .answer-card-panel.open { transform: translateX(0); }
    .answer-card-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 15px;
    }
    .answer-card-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .answer-card-close:hover { color: var(--text); border-color: var(--text); }
    .answer-card-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text2);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }
    .legend-dot.unanswered { background: var(--border); }
    .legend-dot.selected   { background: var(--accent); }
    .legend-dot.correct    { background: var(--success); }
    .legend-dot.wrong      { background: var(--danger); }
    .legend-dot.current-page { outline: 2px solid var(--accent2); }
    .answer-card-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .answer-card-page-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 12px 0 8px;
    }
    .answer-card-page-label:first-child { margin-top: 0; }
    .answer-card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ac-cell {
      width: 38px; height: 38px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .ac-cell.unanswered {
      background: var(--surface2);
      color: var(--text2);
      border-color: var(--border);
    }
    .ac-cell.selected-unsub {
      background: rgba(108,99,255,.2);
      color: var(--accent);
      border-color: var(--accent);
    }
    .ac-cell.correct {
      background: rgba(72,187,120,.18);
      color: var(--success);
      border-color: var(--success);
    }
    .ac-cell.wrong {
      background: rgba(252,129,129,.18);
      color: var(--danger);
      border-color: var(--danger);
    }
    .ac-cell.is-current-page {
      outline: 2px solid var(--accent2);
      outline-offset: 1px;
    }
    .ac-cell:hover { filter: brightness(1.2); }
    .answer-card-summary {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 16px;
      font-size: 13px;
    }
    .ac-sum-item { display: flex; align-items: center; gap: 6px; }
    .ac-sum-dot { width: 10px; height: 10px; border-radius: 50%; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px; }
      .answer-card-panel { width: 100%; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">⚡ 前端知识库</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">首页</button>
    <button class="nav-tab" onclick="showPage('learn')">📖 学习</button>
    <button class="nav-tab" onclick="showPage('drill')">🎯 刷题</button>
  </div>
</nav>

<div class="answer-card-overlay" id="ac-overlay" onclick="toggleAnswerCard(false)"></div>
<div class="answer-card-panel" id="ac-panel">
  <div class="answer-card-panel-header">
    <span>🗒️ 答题卡</span>
    <button class="answer-card-close" onclick="toggleAnswerCard(false)">×</button>
  </div>
  <div class="answer-card-legend">
    <div class="legend-item"><div class="legend-dot unanswered"></div>未作答</div>
    <div class="legend-item"><div class="legend-dot selected"></div>已选未交</div>
    <div class="legend-item"><div class="legend-dot correct"></div>答对</div>
    <div class="legend-item"><div class="legend-dot wrong"></div>答错</div>
  </div>
  <div class="answer-card-body" id="ac-body"></div>
  <div class="answer-card-summary" id="ac-summary"></div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar" style="display:none"></div>
  <div class="content" id="content">
    <div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>
  </div>
</div>

<script src="data/content.js"></script>
<script src="app.js"></script>
</body>
</html>
