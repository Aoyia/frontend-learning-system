<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>前端知识学习系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #4ecdc4;
      --text: #e2e8f0;
      --text2: #8892aa;
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #fc8181;
      --code-bg: #161b22;
      --code-text: #e6edf3;
      --code-muted: #c9d1d9;
      --syntax-keyword: #ff7b72;
      --syntax-title: #d2a8ff;
      --syntax-constant: #79c0ff;
      --syntax-string: #a5d6ff;
      --syntax-variable: #ffa657;
      --syntax-comment: #8b949e;
      --syntax-tag: #7ee787;
      --syntax-section: #1f6feb;
      --syntax-bullet: #f2cc60;
      --syntax-addition: #aff5b4;
      --syntax-addition-bg: #033a16;
      --syntax-deletion: #ffdcd7;
      --syntax-deletion-bg: #67060c;
      --strong-text: #ffffff;
      --mark-bg: rgba(255, 213, 79, .18);
      --mark-text: #ffe89b;
      --blockquote-bg: rgba(108,99,255,.08);
      --radius: 12px;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f6f8fc;
      --surface: #ffffff;
      --surface2: #eef2fb;
      --border: #d7deef;
      --accent: #315efb;
      --accent2: #0ea5a4;
      --text: #1f2937;
      --text2: #5f6b85;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
      --code-bg: #f8fafc;
      --code-text: #24292f;
      --code-muted: #57606a;
      --syntax-keyword: #cf222e;
      --syntax-title: #8250df;
      --syntax-constant: #0550ae;
      --syntax-string: #0a3069;
      --syntax-variable: #953800;
      --syntax-comment: #6e7781;
      --syntax-tag: #116329;
      --syntax-section: #0550ae;
      --syntax-bullet: #3b2300;
      --syntax-addition: #116329;
      --syntax-addition-bg: #dafbe1;
      --syntax-deletion: #82071e;
      --syntax-deletion-bg: #ffebe9;
      --strong-text: #0f172a;
      --mark-bg: rgba(250, 204, 21, .28);
      --mark-text: #713f12;
      --blockquote-bg: rgba(49,94,251,.08);
    }

    @media (prefers-reduced-motion: no-preference) {
      :root.theme-transitioning *,
      :root.theme-transitioning *::before,
      :root.theme-transitioning *::after {
        transition-property: background-color, color, border-color, box-shadow, fill, stroke, opacity;
        transition-duration: .26s;
        transition-timing-function: ease;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ========== NAV ========== */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      margin-right: 16px;
      white-space: nowrap;
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .theme-toggle-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .theme-toggle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .nav-tab {
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all .2s;
      border: none;
      background: transparent;
    }
    .nav-tab:hover { background: var(--surface2); color: var(--text); }
    .nav-tab.active { background: var(--accent); color: #fff; }

    /* ========== LAYOUT ========== */
    .main { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 56px); position: relative; }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      padding: 16px 0;
    }
    .sidebar.is-scrolling {
      scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 6px; height: 6px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    .sidebar.is-scrolling::-webkit-scrollbar-thumb { background: var(--border); }
    .sidebar.is-scrolling::-webkit-scrollbar-thumb:hover { background: var(--text2); }
    .sidebar-module {
      margin-bottom: 4px;
    }
    .sidebar-module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .04em;
      user-select: none;
    }
    .sidebar-module-header:hover { color: var(--text); }
    .sidebar-module-header .chevron {
      margin-left: auto;
      transition: transform .2s;
      font-size: 10px;
    }
    .sidebar-module-header.open .chevron { transform: rotate(90deg); }
    .sidebar-module-list { display: none; }
    .sidebar-module-list.open { display: block; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px 9px 28px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active {
      background: rgba(108, 99, 255, .12);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .sidebar-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sidebar-item.done .dot { background: var(--success); }
    .sidebar-item .item-idx {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }

    /* ========== CONTENT AREA ========== */
    .content { flex: 1; overflow-y: auto; padding: 32px 48px; }
    .content-map { padding: 0; overflow: hidden; }

    /* ========== HOME ========== */
    .home { max-width: 900px; margin: 0 auto; }
    .home-hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .home-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .home-hero p { color: var(--text2); font-size: 15px; }
    .module-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }
    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
    }
    .module-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,.15);
    }
    .module-card-icon { font-size: 28px; margin-bottom: 12px; }
    .module-card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .module-card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .module-card-progress {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width .4s;
    }
    .progress-text { font-size: 12px; color: var(--text2); }

    .home-entry-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 4px 0 30px;
    }
    .home-entry-card {
      min-height: 126px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 18px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 8px;
      transition: all .2s;
    }
    .home-entry-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,.14);
    }
    .home-entry-card.primary {
      border-color: rgba(78,205,196,.45);
      background: linear-gradient(135deg, rgba(78,205,196,.12), rgba(108,99,255,.08)), var(--surface);
    }
    .home-entry-icon { font-size: 26px; }
    .home-entry-title { font-size: 17px; font-weight: 700; }
    .home-entry-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

    /* ========== TECH BREAKER CANVAS ========== */
    .breaker-page {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .breaker-toolbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }
    .breaker-title {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    .breaker-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .map-tool-btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--text2);
      padding: 8px 11px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      transition: all .18s;
      box-shadow: 0 8px 24px rgba(0,0,0,.16);
    }
    .map-tool-btn:hover {
      border-color: var(--accent2);
      color: var(--text);
    }
    .canvas-viewport {
      position: relative;
      flex: 1;
      min-height: 100%;
      overflow: hidden;
      border: none;
      border-radius: 0;
      background:
        radial-gradient(circle at 1px 1px, rgba(136,146,170,.13) 1px, transparent 0) 0 0 / 26px 26px,
        var(--surface);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .canvas-viewport:active { cursor: grabbing; }
    .canvas-world {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .canvas-edges {
      position: absolute;
      overflow: visible;
      pointer-events: none;
    }
    .canvas-edge {
      fill: none;
      stroke: rgba(136,146,170,.34);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }
    .canvas-edge-label {
      fill: var(--text2);
      font-size: 12px;
      paint-order: stroke;
      stroke: var(--surface);
      stroke-width: 4px;
    }
    .canvas-node {
      position: absolute;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: color-mix(in srgb, var(--surface2) 82%, transparent);
      color: var(--text);
      padding: 10px 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.14);
      cursor: grab;
      backdrop-filter: blur(4px);
    }
    .canvas-node:active { cursor: grabbing; }
    .canvas-node.clickable { cursor: pointer; }
    .canvas-node.clickable:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(78,205,196,.13), 0 10px 26px rgba(0,0,0,.22);
    }
    .canvas-node-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }
    .canvas-node-text {
      white-space: pre-wrap;
      margin-top: 7px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text2);
    }
    .canvas-node.color-1 { border-color: rgba(49,94,251,.34); background: rgba(49,94,251,.09); }
    .canvas-node.color-2 { border-color: rgba(72,187,120,.34); background: rgba(72,187,120,.09); }
    .canvas-node.color-3 { border-color: rgba(237,137,54,.34); background: rgba(237,137,54,.09); }
    .canvas-node.color-4 { border-color: rgba(78,205,196,.34); background: rgba(78,205,196,.09); }
    .canvas-node.color-5 { border-color: rgba(108,99,255,.38); background: rgba(108,99,255,.1); }
    .canvas-node.color-6 { border-color: rgba(136,146,170,.34); background: rgba(136,146,170,.08); }
    .breaker-card-wrap .done-banner { align-items: flex-start; }

    /* ========== ARTICLE ========== */
    .article-shell {
      display: grid;
      grid-template-columns: minmax(0, 800px) 220px;
      gap: 28px;
      align-items: start;
      justify-content: center;
      max-width: 1080px;
      margin: 0 auto;
    }
    .article-wrap { max-width: 800px; margin: 0 auto; }
    .article-shell .article-wrap {
      width: 100%;
      max-width: 800px;
      margin: 0;
    }
    .article-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .article-breadcrumb {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .article-breadcrumb span { cursor: pointer; }
    .article-breadcrumb span:hover { color: var(--accent); }
    .article-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .article-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .article-tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text2);
    }
    .article-tag.accent { background: rgba(108,99,255,.2); color: var(--accent); }
    .article-tag.source { background: rgba(72,187,120,.13); color: var(--success); }
    .article-source-card {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      display: grid;
      gap: 6px;
    }
    .article-source-card div {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }
    .article-source-card span { color: var(--text3); }
    .article-source-card a {
      color: var(--accent);
      overflow-wrap: anywhere;
      text-decoration: none;
    }
    .article-source-card a:hover { text-decoration: underline; }
    .article-toc {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 104px);
      overflow-y: auto;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      padding: 12px 0 12px 16px;
      border-left: 1px solid var(--border);
      color: var(--text2);
    }
    .article-toc.is-scrolling {
      scrollbar-color: var(--border) transparent;
    }
    .article-toc::-webkit-scrollbar {
      width: 6px;
    }
    .article-toc::-webkit-scrollbar-track {
      background: transparent;
    }
    .article-toc::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 3px;
    }
    .article-toc.is-scrolling::-webkit-scrollbar-thumb {
      background: var(--border);
    }
    .article-toc.is-scrolling::-webkit-scrollbar-thumb:hover {
      background: var(--text2);
    }
    .article-toc-title {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }
    .article-toc-list {
      display: grid;
      gap: 2px;
    }
    .article-toc-item {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 8px;
      text-align: left;
      transition: color .15s, background .15s;
    }
    .article-toc-item.depth-3 { padding-left: 20px; font-size: 11px; }
    .article-toc-item:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .article-toc-item.active {
      background: rgba(108,99,255,.14);
      color: var(--accent);
      font-weight: 700;
    }

    /* Markdown 内容 */
    .md-body { line-height: 1.8; font-size: 15px; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      margin: 1.8em 0 .8em;
      font-weight: 600;
      line-height: 1.3;
    }
    .md-body h2 { font-size: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 16px; }
    .md-body h1[id], .md-body h2[id], .md-body h3[id], .md-body h4[id] { scroll-margin-top: 24px; }
    .md-body p { margin-bottom: 1em; }
    .md-body ul, .md-body ol { padding-left: 1.6em; margin-bottom: 1em; }
    .md-body li { margin-bottom: .4em; }
    .md-body code {
      background: var(--surface2);
      color: var(--code-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .md-body pre {
      background: var(--code-bg);
      color: var(--code-text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    .md-body pre code,
    .md-body pre code.hljs,
    .md-body pre .hljs {
      background: transparent;
      color: var(--code-text);
      padding: 0;
    }
    .md-body pre code.language-txt,
    .md-body pre code.language-text,
    .md-body pre code.language-plain,
    .md-body pre code.language-plaintext {
      color: var(--code-text);
    }
    .md-body pre .hljs-comment,
    .md-body pre .hljs-quote {
      color: var(--syntax-comment);
    }
    .md-body pre .hljs-doctag,
    .md-body pre .hljs-keyword,
    .md-body pre .hljs-meta .hljs-keyword,
    .md-body pre .hljs-template-tag,
    .md-body pre .hljs-template-variable,
    .md-body pre .hljs-type,
    .md-body pre .hljs-variable.language_ {
      color: var(--syntax-keyword);
    }
    .md-body pre .hljs-title,
    .md-body pre .hljs-title.class_,
    .md-body pre .hljs-title.class_.inherited__,
    .md-body pre .hljs-title.function_ {
      color: var(--syntax-title);
    }
    .md-body pre .hljs-attr,
    .md-body pre .hljs-attribute,
    .md-body pre .hljs-literal,
    .md-body pre .hljs-meta,
    .md-body pre .hljs-number,
    .md-body pre .hljs-operator,
    .md-body pre .hljs-variable,
    .md-body pre .hljs-selector-attr,
    .md-body pre .hljs-selector-class,
    .md-body pre .hljs-selector-id {
      color: var(--syntax-constant);
    }
    .md-body pre .hljs-regexp,
    .md-body pre .hljs-string,
    .md-body pre .hljs-meta .hljs-string {
      color: var(--syntax-string);
    }
    .md-body pre .hljs-built_in,
    .md-body pre .hljs-symbol {
      color: var(--syntax-variable);
    }
    .md-body pre .hljs-name,
    .md-body pre .hljs-selector-tag,
    .md-body pre .hljs-selector-pseudo {
      color: var(--syntax-tag);
    }
    .md-body pre .hljs-subst,
    .md-body pre .hljs-emphasis,
    .md-body pre .hljs-strong {
      color: var(--code-text);
    }
    .md-body pre .hljs-emphasis { font-style: italic; }
    .md-body pre .hljs-strong { font-weight: 700; }
    .md-body pre .hljs-section {
      color: var(--syntax-section);
      font-weight: 700;
    }
    .md-body pre .hljs-bullet { color: var(--syntax-bullet); }
    .md-body pre .hljs-addition {
      color: var(--syntax-addition);
      background-color: var(--syntax-addition-bg);
    }
    .md-body pre .hljs-deletion {
      color: var(--syntax-deletion);
      background-color: var(--syntax-deletion-bg);
    }
    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1em;
      color: var(--text);
    }
    .md-body table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    .md-body th, .md-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 13px;
    }
    .md-body th { background: var(--surface2); }
    .md-body strong { color: var(--strong-text); }
    .md-body mark {
      background: var(--mark-bg);
      color: var(--mark-text);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body a.doc-ref {
      color: var(--accent);
      text-decoration: none;
      opacity: .75;
      font-size: .9em;
    }
    .md-body a.doc-ref:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }
    .article-nav-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      color: var(--text2);
      text-align: left;
    }
    .article-nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .article-nav-btn.right { text-align: right; }
    .article-nav-btn .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .article-nav-btn .title { font-weight: 600; color: var(--text); }

    .done-banner {
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(72,187,120,.1);
      border: 1px solid rgba(72,187,120,.3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .done-banner-text { font-size: 14px; color: var(--success); }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ========== IMMERSIVE READING MODE ========== */
    html[data-immersive="true"] .nav { display: none; }
    html[data-immersive="true"] .main { height: 100vh; }
    html[data-immersive="true"] .sidebar { display: none; }
    html[data-immersive="true"] .content { padding: 48px 80px; }
    html[data-immersive="true"] .article-shell {
      grid-template-columns: minmax(0, 900px) 220px;
      max-width: 1180px;
    }
    html[data-immersive="true"] .article-wrap { max-width: 900px; }
    html[data-immersive="true"] .md-body { font-size: 16px; line-height: 2; }

    .immersive-toolbar {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 7px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      font-size: 13px;
      color: var(--text2);
      animation: immersiveFadeIn .2s ease;
      transition: opacity .4s ease, transform .4s ease;
    }
    .immersive-toolbar.hidden {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }
    .immersive-toolbar-sep {
      width: 1px;
      height: 14px;
      background: var(--border);
    }
    .immersive-toolbar-exit {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 0;
    }
    .immersive-toolbar-exit:hover { color: var(--accent); }
    .immersive-toolbar kbd {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
    }
    .immersive-toggle-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      transition: all .15s;
      white-space: nowrap;
    }
    .immersive-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    @keyframes immersiveFadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== QUIZ ========== */
    .quiz-wrap { max-width: 760px; margin: 0 auto; }
    .quiz-header {
      margin-bottom: 28px;
    }
    .quiz-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .quiz-header p { font-size: 13px; color: var(--text2); }
    .quiz-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .quiz-question {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .quiz-question-num {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .quiz-question-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      font-size: 14px;
      line-height: 1.5;
    }
    .quiz-option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .quiz-option.selected { border-color: var(--accent); background: rgba(108,99,255,.15); }
    .quiz-option.correct { border-color: var(--success); background: rgba(72,187,120,.1); }
    .quiz-option.wrong { border-color: var(--danger); background: rgba(252,129,129,.1); }
    .quiz-option.disabled { cursor: default; }
    .quiz-option .opt-key {
      min-width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-option.selected .opt-key { background: var(--accent); color: #fff; }
    .quiz-option.correct .opt-key { background: var(--success); color: #fff; }
    .quiz-option.wrong .opt-key { background: var(--danger); color: #fff; }
    .quiz-explain {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(108,99,255,.08);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      display: none;
    }
    .quiz-explain.show { display: block; }
    .quiz-explain strong { color: var(--text); }
    .quiz-explain-text { margin-top: 6px; }
    .recommended-reading {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(108,99,255,.18);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .reading-link {
      border: none;
      background: transparent;
      color: var(--accent2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 0;
    }
    .reading-link:hover { text-decoration: underline; }
    .quiz-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .quiz-result {
      text-align: center;
      padding: 40px 20px;
    }
    .quiz-result .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .quiz-result .score-num { font-size: 32px; font-weight: 700; color: var(--accent); }
    .quiz-result .score-label { font-size: 12px; color: var(--text2); }
    .quiz-result h3 { font-size: 22px; margin-bottom: 8px; }
    .quiz-result p { color: var(--text2); margin-bottom: 24px; }
    .quiz-result .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ========== DRILL ========== */
    .drill-wrap { max-width: 760px; margin: 0 auto; }
    .drill-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .drill-header h2 { font-size: 22px; font-weight: 700; }
    .drill-stats {
      display: flex;
      gap: 20px;
    }
    .drill-stat { text-align: center; }
    .drill-stat .val { font-size: 20px; font-weight: 700; color: var(--accent); }
    .drill-stat .lbl { font-size: 12px; color: var(--text2); }

    /* ========== MODULE SELECT ========== */
    .module-select-page { max-width: 700px; margin: 0 auto; }
    .module-select-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .module-select-page p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
    .module-select-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .module-select-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .module-select-card:hover { border-color: var(--accent); }
    .module-select-card.selected { border-color: var(--accent); background: rgba(108,99,255,.1); }
    .module-select-card .icon { font-size: 24px; margin-bottom: 8px; }
    .module-select-card .name { font-size: 14px; font-weight: 600; }
    .module-select-card .count { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .module-card-actions {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .mini-btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      border-radius: 7px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .mini-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .mini-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .mini-btn.primary:hover { background: #5a52d5; color: #fff; }
    .mini-btn.ghost { background: transparent; }

    .wrongbook-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .wrongbook-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .wrongbook-item-title {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 4px;
    }
    .wrongbook-item-meta {
      font-size: 12px;
      color: var(--text2);
    }

    /* ========== MISC ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-easy { background: rgba(72,187,120,.15); color: var(--success); }
    .badge-medium { background: rgba(237,137,54,.15); color: var(--warning); }
    .badge-hard { background: rgba(252,129,129,.15); color: var(--danger); }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 400;
      pointer-events: none;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ========== 答题卡 ========== */
    .answer-card-sidebar {
      display: none;
      width: 220px;
      min-width: 220px;
      height: 100%;
      max-height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease, min-width .2s ease;
    }
    .answer-card-sidebar.collapsed {
      width: 42px;
      min-width: 42px;
    }
    .ac-collapsed-bar {
      display: none;
      height: 100%;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text2);
      cursor: pointer;
      writing-mode: vertical-rl;
      user-select: none;
    }
    .answer-card-sidebar.collapsed .ac-collapsed-bar { display: flex; }
    .answer-card-sidebar.collapsed .ac-inner { display: none; }
    .ac-collapsed-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
    }
    .ac-inner {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }
    .ac-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .ac-progress-text {
      margin-top: 2px;
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
    }
    .ac-toggle-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .ac-toggle-btn:hover { color: var(--text); border-color: var(--text); }
    .answer-card-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }
    .answer-card-page + .answer-card-page {
      margin-top: 10px;
    }
    .answer-card-page-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .answer-card-page-label.current {
      color: var(--accent2);
    }
    .answer-card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ac-cell {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .ac-cell.unanswered {
      background: var(--surface2);
      color: var(--text2);
      border-color: var(--border);
    }
    .ac-cell.selected-unsub {
      background: rgba(108,99,255,.2);
      color: var(--accent);
      border-color: var(--accent);
    }
    .ac-cell.correct {
      background: rgba(72,187,120,.18);
      color: var(--success);
      border-color: var(--success);
    }
    .ac-cell.wrong {
      background: rgba(252,129,129,.18);
      color: var(--danger);
      border-color: var(--danger);
    }
    .ac-cell.is-current-page {
      box-shadow: inset 0 0 0 1px var(--accent2);
    }
    .ac-cell:hover { filter: brightness(1.2); }
    .answer-card-summary {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      font-size: 12px;
      color: var(--text2);
    }
    .ac-sum-item { display: flex; align-items: center; gap: 6px; }
    .ac-sum-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }

    @media (max-width: 1180px) {
      .article-shell { display: block; max-width: 800px; }
      .article-toc { display: none; }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px 72px; }
      .nav { padding: 0 12px; }
      .nav-logo { margin-right: 6px; font-size: 14px; }
      .nav-tabs { overflow-x: auto; }
      .nav-tab { padding: 6px 9px; white-space: nowrap; }
      .theme-toggle-btn { padding: 6px 10px; font-size: 12px; }
      .home-entry-grid { grid-template-columns: 1fr; }
      .content-map { padding: 0; }
      .breaker-toolbar { top: 10px; left: 10px; right: 10px; }
      .breaker-title { padding: 7px 10px; font-size: 13px; }
      .map-tool-btn { padding: 7px 9px; }
      .canvas-viewport { min-height: calc(100vh - 56px); }
      .wrongbook-item { align-items: flex-start; flex-direction: column; }
      .answer-card-sidebar,
      .answer-card-sidebar.collapsed {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 150;
        width: 100%;
        min-width: 0;
        height: min(68vh, 460px);
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(calc(100% - 44px));
        transition: transform .24s ease;
      }
      .answer-card-sidebar.open {
        transform: translateY(0);
      }
      .answer-card-sidebar .ac-collapsed-bar,
      .answer-card-sidebar.collapsed .ac-collapsed-bar {
        display: flex;
        height: 44px;
        flex-direction: row;
        writing-mode: horizontal-tb;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .answer-card-sidebar .ac-inner,
      .answer-card-sidebar.collapsed .ac-inner {
        display: flex;
        height: calc(100% - 44px);
      }
      .answer-card-sidebar .ac-header { display: none; }
      .answer-card-body { padding: 12px 14px; }
      .answer-card-summary { padding: 10px 14px; grid-template-columns: repeat(4, max-content); }
    }
  </style>
</head>
<body>

<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
