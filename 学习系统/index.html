<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>前端知识学习系统</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      if (!redirect) return;
      var base = window.location.pathname.replace(/\/$/, '');
      if (base !== '/frontend-learning-system') base = '';
      window.history.replaceState(null, '', base + redirect);
    })();
  </script>
  <script>
    // 在页面渲染前从 localStorage 中同步读取并应用主题，防止暗黑/亮色模式切换时的屏幕闪烁
    (function () {
      var savedTheme = localStorage.getItem('learn-theme');
      if (savedTheme === 'light' || savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.3s ease;
    }
    
    /* 极致大气的自适应黑白主题配置 */
    html[data-theme="light"] #initial-loader {
      background-color: #ffffff;
      --loader-color: #0f172a;
      --loader-text: #64748b;
      --grad-start: #315efb; /* 优雅法兰西蓝 */
      --grad-end: #0ea5a4;   /* 极简青 */
      --track-color: rgba(15, 23, 42, 0.06);
    }
    html[data-theme="dark"] #initial-loader {
      background-color: #0f1117;
      --loader-color: #f1f5f9;
      --loader-text: #64748b;
      --grad-start: #00f2fe; /* 荧光青蓝 */
      --grad-end: #6c63ff;   /* 极光紫 */
      --track-color: rgba(241, 245, 249, 0.06);
    }
    #initial-loader {
      background-color: #0f1117;
      --loader-color: #f1f5f9;
      --loader-text: #64748b;
      --grad-start: #00f2fe;
      --grad-end: #6c63ff;
      --track-color: rgba(241, 245, 249, 0.06);
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    
    .loader-spinner {
      width: 96px;
      height: 58px;
      overflow: visible;
      transform-origin: center;
      animation: apple-spinner-breathe 3s ease-in-out infinite;
    }
    
    /* 渐变节点颜色映射 */
    .grad-start { stop-color: var(--grad-start); }
    .grad-end { stop-color: var(--grad-end); }
    
    .loader-spinner .track {
      stroke: var(--track-color);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.04; /* 极致轻薄的隐约轨迹线 */
      transition: stroke 0.25s ease;
    }
    
    /* ♾️ 共享滑动路径基础配置 */
    .loader-spinner .path {
      stroke: var(--loader-color);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: 0.85;
      transition: stroke 0.25s ease;
      animation: cosine-dash 1.8s linear infinite;
    }
    
    /* 简洁大气的高雅文字：细体、大字母间距、配合极为优雅平缓的呼吸动效 */
    .loader-text {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--loader-text);
      margin: 0;
      text-transform: uppercase;
      padding-left: 0.25em; /* 完美水平居中 */
      transition: color 0.25s ease;
      animation: apple-text-pulse 3s ease-in-out infinite;
    }

    /* 慢速高雅的文本渐变呼吸 */
    @keyframes apple-text-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.9; }
    }

    /* 
       利用简谐运动余弦公式对光束长度进行周期控制：L(d) = 28 + 12 * cos(4 * pi * d / 100)
       - 当滑行到两侧大圆弧时 (0% 和 50%)，由于离心力线段拉伸至最长 40
       - 当滑行到中间交叉狭窄切点时 (25% 和 75%)，由于挤压力线段收缩至最短 16
       - 配合双倍长度路径 (pathLength=200)，空白段宽度设为 200 以保证尾部正确消隐
    */
    @keyframes cosine-dash {
      0% {
        stroke-dasharray: 40, 200;
        stroke-dashoffset: 0;
      }
      25% {
        stroke-dasharray: 16, 200;
        stroke-dashoffset: -25;
      }
      50% {
        stroke-dasharray: 40, 200;
        stroke-dashoffset: -50;
      }
      75% {
        stroke-dasharray: 16, 200;
        stroke-dashoffset: -75;
      }
      100% {
        stroke-dasharray: 40, 200;
        stroke-dashoffset: -100;
      }
    }
    @keyframes apple-spinner-breathe {
      0%, 100% {
        transform: scale(0.96);
        opacity: 0.75;
      }
      50% {
        transform: scale(1.02);
        opacity: 0.98;
      }
    }
  </style>
  <!-- 样式已由 Tailwind CSS v4 和 src/index.css 接管 -->
</head>

        </defs>
        
        <!-- ♾️ 背景辅助轨道 -->
        <use href="#infinity-path" class="track" fill="none" />
        
        <!-- ♾️ 单根优雅光束：运用余弦波物理律动收缩伸展 -->

      </svg>
      <p class="loader-text">Loading</p>
    </div>
  </div>
